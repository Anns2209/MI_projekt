version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - mood_great
  - mood_unhappy
  - bot_challenge
  - predmet_info
  - video_povezava
  - shrani_video
  - analiziraj_video
  - zahvala
  - prikazi_videe


actions:
  - action_vrni_informacije
  - action_shrani_video
  - action_analiziraj_video
  - action_prikazi_videe

responses:
  utter_greet:
  - text: "Hey! How are you?"

  utter_cheer_up:
  - text: "Here is something to cheer you up:"
    image: "https://i.imgur.com/nGF1K8f.jpg"

  utter_did_that_help:
  - text: "Did that help you?"

  utter_happy:
  - text: "Great, carry on!"

  utter_goodbye:
  - text: "Bye"

  utter_iamabot:
  - text: "I am a bot, powered by Rasa."

  utter_video_potrjeno:
  - text: "Prejela sem video povezavo. Želiš, da jo shranim ali analiziram?"

  utter_prosim:
  - text: "Prosim 🙂"

  utter_prikazi_videe:
  - text: "Zdaj ti bom prikazala zadnje povezave."

  utter_default:
  - text: "Oprosti, nisem razumela. Lahko prosim ponoviš?"


entities:
  - ime

slots:
  ime:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: ime






session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
